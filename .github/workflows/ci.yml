name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - name: Build WebUI
        working-directory: webui
        run: npm ci && npm run build
      - run: cargo clippy --all-targets -- -D warnings

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - name: Build WebUI
        working-directory: webui
        run: npm ci && npm run build
      - run: cargo test --lib

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      mqtt:
        image: eclipse-mosquitto:2.0
        ports:
          - 1883:1883
        options: >-
          --health-cmd "mosquitto_sub -t '$$SYS/#' -C 1 -W 3 || true"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      navidrome:
        image: deluan/navidrome:latest
        ports:
          - 4533:4533
        env:
          ND_SCANSCHEDULE: "0"
          ND_LOGLEVEL: error
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - name: Build WebUI
        working-directory: webui
        run: npm ci && npm run build
      - name: Install snapserver
        run: |
          sudo apt-get update
          sudo apt-get install -y snapserver
      - name: Create test env
        run: |
          cat > .env.test << EOF
          SNAPDOG_TEST_SUBSONIC_URL=http://localhost:4533
          SNAPDOG_TEST_SUBSONIC_USERNAME=admin
          SNAPDOG_TEST_SUBSONIC_PASSWORD=admin
          SNAPDOG_TEST_MQTT_BROKER=localhost:1883
          SNAPDOG_TEST_MQTT_USERNAME=
          SNAPDOG_TEST_MQTT_PASSWORD=
          EOF
      - name: Run integration tests
        run: cargo test --test integration -- --test-threads=1

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
