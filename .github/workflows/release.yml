name: Release

on:
  push:
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  meta:
    name: Release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Parse version
        id: meta
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          { echo "tag=${TAG}"; echo "version=${VERSION}"; } >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.target }})
    needs: meta
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - name: Build WebUI
        working-directory: webui
        run: npm ci && npm run build
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          . /etc/os-release
          sudo sed -i 's/^Types: deb$/Types: deb\nArchitectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources
          cat <<EOF | sudo tee /etc/apt/sources.list.d/arm64.list
          deb [arch=arm64] http://ports.ubuntu.com/ ${VERSION_CODENAME} main restricted universe
          deb [arch=arm64] http://ports.ubuntu.com/ ${VERSION_CODENAME}-updates main restricted universe
          deb [arch=arm64] http://ports.ubuntu.com/ ${VERSION_CODENAME}-security main restricted universe
          EOF
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu cmake libssl-dev:arm64 libasound2-dev:arm64 pkg-config
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=/usr/lib/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/usr/include/aarch64-linux-gnu" >> $GITHUB_ENV
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package binary
        shell: bash
        run: |
          VERSION=${{ needs.meta.outputs.version }}
          TAG=${{ needs.meta.outputs.tag }}
          archive="snapdog-${TAG}-${{ matrix.target }}"
          mkdir "$archive"
          cp "target/${{ matrix.target }}/release/snapdog" "$archive/" 2>/dev/null || \
          cp "target/${{ matrix.target }}/release/snapdog.exe" "$archive/"
          cp "target/${{ matrix.target }}/release/snapdog-client" "$archive/" 2>/dev/null || \
          cp "target/${{ matrix.target }}/release/snapdog-client.exe" "$archive/" 2>/dev/null || true
          cp LICENSE README.md "$archive/" 2>/dev/null || true
          tar czf "${archive}.tar.gz" "$archive"
          shasum -a 256 "${archive}.tar.gz" > "${archive}.tar.gz.sha256"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: snapdog-${{ matrix.target }}
          path: |
            snapdog-*.tar.gz
            snapdog-*.tar.gz.sha256

  build-deb:
    name: Debian ${{ matrix.pkg }} (${{ matrix.arch }})
    needs: meta
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
        pkg: [snapdog, snapdog-client]
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install deps
        run: |
          sudo apt-get update && sudo apt-get install -y libasound2-dev
          cargo install cargo-deb
      - uses: actions/setup-node@v6
        if: matrix.pkg == 'snapdog'
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - name: Build WebUI
        if: matrix.pkg == 'snapdog'
        working-directory: webui
        run: npm ci && npm run build
      - run: cargo build --release -p ${{ matrix.pkg }}
      - run: cargo deb -p ${{ matrix.pkg }} --no-build
      - uses: actions/upload-artifact@v7
        with:
          name: deb-${{ matrix.pkg }}-${{ matrix.arch }}
          path: target/debian/*.deb

  upload-release-artifacts:
    name: Upload Release Artifacts
    runs-on: ubuntu-latest
    needs: [meta, build, build-deb]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Collect assets
        run: |
          mkdir release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.tar.gz.sha256" -o -name "*.deb" \) -exec cp {} release-assets/ \;
          cd release-assets && sha256sum * > SHA256SUMS
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.meta.outputs.tag }}" release-assets/* \
            --repo ${{ github.repository }} --clobber

  publish-aur:
    name: AUR (${{ matrix.pkg }})
    needs: [meta, upload-release-artifacts]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - pkg: snapdog
            pkgbuild: aur/snapdog/PKGBUILD
          - pkg: snapdog-client
            pkgbuild: aur/snapdog-client/PKGBUILD
    steps:
      - uses: actions/checkout@v6
      - name: Update PKGBUILD version
        run: |
          VERSION=${{ needs.meta.outputs.version }}
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" ${{ matrix.pkgbuild }}
          sed -i "s/^pkgrel=.*/pkgrel=1/" ${{ matrix.pkgbuild }}
      - uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: ${{ matrix.pkg }}
          pkgbuild: ${{ matrix.pkgbuild }}
          commit_username: metaneutrons
          commit_email: aur@metaneutrons.github.io
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ needs.meta.outputs.version }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519

  docker:
    name: Docker ${{ matrix.image }} (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - image: snapdog
            file: Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
          - image: snapdog
            file: Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - image: snapdog-client
            file: devcontainer/snapdog-client/Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
          - image: snapdog-client
            file: devcontainer/snapdog-client/Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository }}${{ matrix.image == 'snapdog-client' && '-client' || '' }},push-by-digest=true,name-canonical=true,push=true
          provenance: false
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.image }}-${{ matrix.runner }}
          path: /tmp/digests/*

  docker-manifest:
    name: Docker Manifest (${{ matrix.image }})
    needs: docker
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: snapdog
            repo: ghcr.io/metaneutrons/snapdog
          - image: snapdog-client
            repo: ghcr.io/metaneutrons/snapdog-client
    permissions:
      packages: write
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v8
        with:
          pattern: digest-${{ matrix.image }}-*
          merge-multiple: true
          path: /tmp/digests
      - uses: docker/setup-buildx-action@v4
      - name: Create and push manifest
        run: |
          TAGS="${{ matrix.repo }}:${{ github.ref_name }} ${{ matrix.repo }}:latest"
          DIGESTS=$(printf '${{ matrix.repo }}@sha256:%s ' $(ls /tmp/digests/))
          docker buildx imagetools create $(printf -- '-t %s ' $TAGS) $DIGESTS
