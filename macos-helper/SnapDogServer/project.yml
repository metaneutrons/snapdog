name: SnapDog Server
options:
  bundleIdPrefix: eu.schmieder.snapdog
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  TOMLKit:
    url: https://github.com/LebJe/TOMLKit.git
    exactVersion: "0.6.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    exactVersion: "2.9.1"

targets:
  SnapDog Server:
    type: application
    platform: macOS
    sources:
      - path: SnapDog Server
    dependencies:
      - package: TOMLKit
      - package: Sparkle
    postBuildScripts:
      - name: Copy snapdog binary
        script: |
          HELPERS_DIR="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Helpers"
          mkdir -p "$HELPERS_DIR"
          cp "${SRCROOT}/../../target/release/snapdog" "$HELPERS_DIR/" 2>/dev/null || \
          cp "${SRCROOT}/../../target/debug/snapdog" "$HELPERS_DIR/" || \
          echo "warning: snapdog binary not found"
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metaneutrons.snapdog.helper
        PRODUCT_NAME: SnapDog Server
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        INFOPLIST_FILE: "SnapDog Server/Info.plist"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: true
        ENABLE_APP_SANDBOX: false
        CODE_SIGN_IDENTITY: "-"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: "SnapDog Server/Info.plist"
      properties:
        LSUIElement: true
        CFBundleName: SnapDog Server
        CFBundleDisplayName: SnapDog Server
        CFBundleIdentifier: eu.schmieder.snapdog.server
        NSHumanReadableCopyright: "Copyright © 2026 Fabian Schmieder. All rights reserved."
        SUFeedURL: "https://updates.snapdog.cc/helper/appcast.xml"
        SUPublicEDKey: "UIAhw75KiR/srNxODDCPJSZyNtdRY3PEH1eVvyE8LKQ="
