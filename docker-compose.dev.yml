services:
  snapclient-living-room:
    build: ./devcontainer/snapcast-client
    command: ["snapclient", "--host", "host.docker.internal", "--player", "file:filename=/dev/null"]
    networks:
      snapdog-dev:
        mac_address: 02:42:ac:11:00:10
    restart: unless-stopped

  snapclient-kitchen:
    build: ./devcontainer/snapcast-client
    command: ["snapclient", "--host", "host.docker.internal", "--player", "file:filename=/dev/null"]
    networks:
      snapdog-dev:
        mac_address: 02:42:ac:11:00:11
    restart: unless-stopped

  snapclient-bedroom:
    build: ./devcontainer/snapcast-client
    command: ["snapclient", "--host", "host.docker.internal", "--player", "file:filename=/dev/null"]
    networks:
      snapdog-dev:
        mac_address: 02:42:ac:11:00:12
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
    volumes:
      - ./devcontainer/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      snapdog-dev:
    restart: unless-stopped

  knxd:
    build:
      context: ./devcontainer/knxd
    environment:
      - ADDRESS=0.0.1
      - CLIENT_ADDRESS=0.0.2:8
      - INTERFACE=dummy
    ports:
      - "3671:3671"
    networks:
      snapdog-dev:
    restart: unless-stopped

  knx-monitor:
    image: ghcr.io/metaneutrons/knxmonitor:latest
    volumes:
      - ./devcontainer/knx-groupaddresses.csv:/app/knx-groupaddresses.csv:ro
    environment:
      - TZ=Europe/Berlin
    command: ["-g", "knxd", "--csv", "/app/knx-groupaddresses.csv", "--logging-mode"]
    depends_on: [knxd]
    networks:
      snapdog-dev:
    restart: unless-stopped

  navidrome:
    image: deluan/navidrome:latest
    environment:
      ND_SCANSCHEDULE: "1h"
      ND_LOGLEVEL: info
      ND_MUSICFOLDER: /music
    ports:
      - "4533:4533"
    volumes:
      - ./devcontainer/music:/music:ro
      - ./devcontainer/navidrome/navidrome.db:/data/navidrome.db
    networks:
      snapdog-dev:
    restart: unless-stopped

networks:
  snapdog-dev:
    driver: bridge
