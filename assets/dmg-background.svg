<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="50%" stop-color="#0f0d0b"/>
      <stop offset="100%" stop-color="#1a1410"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#e1882e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#e1882e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arrow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e1882e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e1882e" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Ambient glow behind icons -->
  <ellipse cx="300" cy="190" rx="200" ry="120" fill="url(#glow)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#e1882e" stroke-width="0.5">
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
  </g>
  <!-- Animated-style arrow (three chevrons) -->
  <g opacity="0.4" stroke="url(#arrow-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M280 195 L295 205 L280 215"/>
    <path d="M298 195 L313 205 L298 215" opacity="0.7"/>
    <path d="M316 195 L331 205 L316 215" opacity="0.4"/>
  </g>
  <!-- Top-left branding -->
  <text x="24" y="28" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="11" font-weight="500" fill="#e1882e" opacity="0.3" letter-spacing="1">SNAPDOG</text>
</svg>
